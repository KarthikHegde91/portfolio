# -- Site Configuration --

baseURL = "https://karthikhegde.in/"
languageCode = "en"
title = "Karthik B Hegde | DevOps Engineer"
theme = "blowfish"

enableEmoji = true
enableRobotsTXT = true

[taxonomies]
  tag = "tags"
  category = "categories"

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS", "JSON"]

[sitemap]
  changeFreq = "weekly"
  priority = 0.5
